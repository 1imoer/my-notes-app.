<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملاحظاتي الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-950 min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

    <div class="max-w-md mx-auto p-4 pb-24">
        
        <header class="flex justify-between items-center mb-6 pt-2">
            <div>
                <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
                    <i class="fa-solid fa-note-sticky text-3xl animate-pulse"></i>
                    ملاحظاتي الذكية
                </h1>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">إصدار بروفيشينال فائق السرعة</p>
            </div>
            <button id="themeToggle" class="w-10 h-10 rounded-full glass border border-slate-200 dark:border-slate-700 flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-moon text-lg text-indigo-600 dark:hidden"></i>
                <i class="fa-solid fa-sun text-lg text-amber-400 hidden dark:block"></i>
            </button>
        </header>

        <div class="mb-6 flex flex-col gap-3">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن أي ملاحظة..." class="w-full pl-4 pr-10 py-3 rounded-2xl glass border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-sm transition-all">
            </div>
            <div class="flex gap-2 overflow-x-auto pb-1" id="categoryFilters">
                <button onclick="filterNotes('all')" class="cat-btn active bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shadow-sm">الكل</button>
                <button onclick="filterNotes('عمل')" class="cat-btn bg-white dark:bg-slate-800 px-4 py-1.5 rounded-full text-xs text-slate-600 dark:text-slate-300 whitespace-nowrap border border-slate-200 dark:border-slate-700">💼 عمل</button>
                <button onclick="filterNotes('شخصي')" class="cat-btn bg-white dark:bg-slate-800 px-4 py-1.5 rounded-full text-xs text-slate-600 dark:text-slate-300 whitespace-nowrap border border-slate-200 dark:border-slate-700">🏠 شخصي</button>
                <button onclick="filterNotes('أفكار')" class="cat-btn bg-white dark:bg-slate-800 px-4 py-1.5 rounded-full text-xs text-slate-600 dark:text-slate-300 whitespace-nowrap border border-slate-200 dark:border-slate-700">💡 أفكار</button>
            </div>
        </div>

        <div id="notesContainer" class="grid grid-cols-1 gap-4">
            </div>

        <div id="emptyState" class="hidden text-center py-16">
            <i class="fa-regular fa-folder-open text-5xl text-slate-300 dark:text-slate-600 mb-3"></i>
            <p class="text-slate-500 dark:text-slate-400 text-sm">لا توجد ملاحظات حالياً، ابدأ بإضافة واحدة!</p>
        </div>
    </div>

    <button id="openModalBtn" class="fixed bottom-6 left-6 w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110 active:scale-95 z-40">
        <i class="fa-solid fa-plus text-xl"></i>
    </button>

    <div id="noteModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl transform translate-y-full transition-transform duration-300" id="modalContent">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold" id="modalTitle">ملاحظة جديدة</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <input type="hidden" id="noteId">
            <input type="text" id="noteTitleInput" placeholder="العنوان" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
            <textarea id="noteContentInput" rows="5" placeholder="اكتب تفاصيل ملاحظتك هنا..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"></textarea>
            
            <div class="mb-5">
                <label class="block text-xs text-slate-500 mb-2 font-medium">اختر التصنيف:</label>
                <select id="noteCategorySelect" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="عام">⚙️ عام</option>
                    <option value="عمل">💼 عمل</option>
                    <option value="شخصي">🏠 شخصي</option>
                    <option value="أفكار">💡 أفكار</option>
                </select>
            </div>

            <button id="saveNoteBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md transition-colors text-sm">حفظ الملاحظة</button>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('smart_notes')) || [];
        let currentFilter = 'all';

        // عناصر الواجهة
        const notesContainer = document.getElementById('notesContainer');
        const emptyState = document.getElementById('emptyState');
        const noteModal = document.getElementById('noteModal');
        const modalContent = document.getElementById('modalContent');
        const themeToggle = document.getElementById('themeToggle');

        // تفعيل المظهر الداكن بناءً على تفضيل الجهاز أو الحفظ السابق
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // فتح وإغلاق النافذة المنبثقة
        document.getElementById('openModalBtn').addEventListener('click', () => openModal());
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        
        function openModal(note = null) {
            noteModal.classList.remove('hidden');
            setTimeout(() => {
                noteModal.classList.remove('opacity-0');
                modalContent.classList.remove('translate-y-full');
            }, 50);

            if (note) {
                document.getElementById('modalTitle').innerText = 'تعديل الملاحظة';
                document.getElementById('noteId').value = note.id;
                document.getElementById('noteTitleInput').value = note.title;
                document.getElementById('noteContentInput').value = note.content;
                document.getElementById('noteCategorySelect').value = note.category;
            } else {
                document.getElementById('modalTitle').innerText = 'ملاحظة جديدة';
                document.getElementById('noteId').value = '';
                document.getElementById('noteTitleInput').value = '';
                document.getElementById('noteContentInput').value = '';
                document.getElementById('noteCategorySelect').value = 'عام';
            }
        }

        function closeModal() {
            noteModal.classList.add('opacity-0');
            modalContent.classList.add('translate-y-full');
            setTimeout(() => noteModal.classList.add('hidden'), 300);
        }

        // حفظ وإنشاء الملاحظة
        document.getElementById('saveNoteBtn').addEventListener('click', () => {
            const id = document.getElementById('noteId').value;
            const title = document.getElementById('noteTitleInput').value.trim();
            const content = document.getElementById('noteContentInput').value.trim();
            const category = document.getElementById('noteCategorySelect').value;

            if (!title || !content) {
                alert('الرجاء كتابة العنوان والمحتوى أولاً!');
                return;
            }

            if (id) {
                // تعديل ملاحظة قائمة
                notes = notes.map(n => n.id == id ? { ...n, title, content, category, date: new Date().toLocaleDateString('ar-EG') } : n);
            } else {
                // إضافة ملاحظة جديدة
                const newNote = {
                    id: Date.now(),
                    title,
                    content,
                    category,
                    pinned: false,
                    date: new Date().toLocaleDateString('ar-EG')
                };
                notes.unshift(newNote);
            }

            saveToLocalStorage();
            renderNotes();
            closeModal();
        });

        function saveToLocalStorage() {
            localStorage.setItem('smart_notes', JSON.stringify(notes));
        }

        // عرض الملاحظات على الشاشة بديناميكية احترافية
        function renderNotes(searchQuery = '') {
            notesContainer.innerHTML = '';
            
            // ترتيب الملاحظات (المثبتة أولاً)
            let filtered = notes.sort((a, b) => b.pinned - a.pinned);

            // تصفية حسب القسم
            if (currentFilter !== 'all') {
                filtered = filtered.filter(n => n.category === currentFilter);
            }

            // تصفية حسب البحث
            if (searchQuery) {
                filtered = filtered.filter(n => n.title.includes(searchQuery) || n.content.includes(searchQuery));
            }

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            filtered.forEach(note => {
                const card = document.createElement('div');
                card.className = `glass p-5 rounded-2xl border ${note.pinned ? 'border-indigo-500 dark:border-indigo-400 ring-2 ring-indigo-500/10' : 'border-slate-200 dark:border-slate-700/60'} shadow-sm relative group transition-all hover:shadow-md`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2 mb-2">
                        <span class="text-xs font-semibold px-2.5 py-1 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">${getCategoryIcon(note.category)} ${note.category}</span>
                        <div class="flex gap-2">
                            <button onclick="togglePin(${note.id})" class="text-slate-400 hover:text-amber-500 transition-colors ${note.pinned ? 'text-amber-500' : ''}">
                                <i class="fa-solid fa-thumbtack"></i>
                            </button>
                            <button onclick="deleteNote(${note.id})" class="text-slate-400 hover:text-rose-500 transition-colors">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                    <div onclick='editNoteTrigger(${JSON.stringify(note)})' class="cursor-pointer">
                        <h4 class="font-bold text-base mb-1.5 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">${note.title}</h4>
                        <p class="text-xs text-slate-600 dark:text-slate-300 line-clamp-3 leading-relaxed mb-3">${note.content.replace(/\n/g, '<br>')}</p>
                        <span class="text-[10px] text-slate-400 block">${note.date}</span>
                    </div>
                `;
                notesContainer.appendChild(card);
            });
        }

        function getCategoryIcon(cat) {
            if(cat === 'عمل') return '💼';
            if(cat === 'شخصي') return '🏠';
            if(cat === 'أفكار') return '💡';
            return '⚙️';
        }

        // الأفعال: تثبيت، حذف، تعديل، فلترة، بحث
        window.togglePin = function(id) {
            notes = notes.map(n => n.id === id ? { ...n, pinned: !n.pinned } : n);
            saveToLocalStorage();
            renderNotes();
        }

        window.deleteNote = function(id) {
            if(confirm('هل أنت متأكد من حذف هذه الملاحظة الفخمة؟')) {
                notes = notes.filter(n => n.id !== id);
                saveToLocalStorage();
                renderNotes();
            }
        }

        window.editNoteTrigger = function(note) {
            openModal(note);
        }

        window.filterNotes = function(category) {
            currentFilter = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300');
            });
            event.target.classList.replace('bg-white', 'bg-indigo-600');
            event.target.classList.replace('text-slate-600', 'text-white');
            renderNotes();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderNotes(e.target.value.trim());
        });

        // التشغيل الأولي للعرض
        renderNotes();
    </script>
</body>
</html>
